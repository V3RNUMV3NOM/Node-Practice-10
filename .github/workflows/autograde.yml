name: Node.js CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x' # Можеш вказати ту версію, яку використовуєш локально
        
    - name: Install dependencies
      run: npm install
      
    - name: Run tests
      run: npm test # або node --test, якщо тести написані на вбудованому тест-раннері Node.js